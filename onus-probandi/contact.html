<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Contact | Onus Probandi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Contact the Onus Probandi team — Queensland crime thriller short film by Webstreamedia.">
  <link rel="canonical" href="https://webstreamedia.com.au/onus-probandi/contact.html">
  <link rel="stylesheet" href="/style.css">
</head>

<body class="onus">

<header>
  <nav>
    <div class="logo">
      <a href="/" aria-label="Webstreamedia home">
        <img src="/assets/logo.png" alt="Webstreamedia">
      </a>
    </div>
    <div class="nav-links">
      <a href="/onus-probandi/">Overview</a>
      <a href="/onus-probandi/concept.html">Concept</a>
      <a href="/onus-probandi/roles.html">Roles</a>
      <a href="/onus-probandi/crew.html">Crew Bio</a>
      <a href="/onus-probandi/production.html">Production</a>
      <a class="is-active" href="/onus-probandi/contact.html">Contact</a>
    </div>
  </nav>
</header>

<main class="wrap">
  <h1>Contact</h1>

  <section class="card">
    <h2>Enquiries</h2>
    <p class="muted">
      For casting, production, or general enquiries about Onus Probandi, fill out the form below
      or email us directly at <a href="mailto:admin@webstreamedia.com">admin@webstreamedia.com</a>.
    </p>

    <form name="onus-contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/onus-probandi/contact-success.html">
      <input type="hidden" name="form-name" value="onus-contact" />
      <p style="display:none;">
        <label>Don't fill this out: <input name="bot-field" /></label>
      </p>
      <div>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" autocomplete="name" required>
      </div>
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <button class="btn" type="submit">Send</button>
    </form>
  </section>
</main>

<div id="siteFooter"></div>
<script defer src="assets/onus-shell.js"></script>

</body>
</html>
